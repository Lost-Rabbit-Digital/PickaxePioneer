[plugin]

name="Manage User Data"
description="A Godot 4 editor plugin for browsing and managing the contents of your game's user:// directory without leaving the editor. Displays the full directory tree with file names and types. Filter entries by name or file type (All, Files, Folders, .json, .cache), bulk-select or deselect everything with a single click, and delete selected files and folders with a confirmation step to prevent accidents. Refresh the listing on demand or jump directly to the user:// folder in your OS file manager. Useful during development for resetting save data, wiping cached files, or inspecting what your game is writing to disk."
author="Lost Rabbit Digital"
version="2.4.6"
min_godot_version="4.3"
script="plugin.gd"
