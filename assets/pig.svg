<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Body -->
  <rect x="6" y="12" width="18" height="13" fill="#F4A0A0"/>
  <!-- Head -->
  <rect x="18" y="9" width="12" height="12" fill="#F4A0A0"/>
  <!-- Snout -->
  <rect x="26" y="14" width="5" height="5" fill="#E07080"/>
  <!-- Nostrils -->
  <rect x="27" y="15" width="1" height="1" fill="#B04050"/>
  <rect x="29" y="15" width="1" height="1" fill="#B04050"/>
  <!-- Eye -->
  <rect x="23" y="11" width="2" height="2" fill="#1A1A1A"/>
  <!-- Ear -->
  <rect x="19" y="7" width="4" height="4" fill="#E07080"/>
  <rect x="21" y="5" width="3" height="3" fill="#E07080"/>
  <!-- Belly -->
  <rect x="10" y="17" width="10" height="6" fill="#F8C0C0"/>
  <!-- Tail (curly) -->
  <rect x="5" y="13" width="3" height="3" fill="#F4A0A0"/>
  <rect x="3" y="15" width="3" height="2" fill="#F4A0A0"/>
  <rect x="5" y="16" width="2" height="2" fill="#F4A0A0"/>
  <!-- Legs -->
  <rect x="9" y="25" width="4" height="5" fill="#E07080"/>
  <rect x="15" y="25" width="4" height="5" fill="#E07080"/>
  <!-- Hooves -->
  <rect x="9" y="28" width="4" height="2" fill="#805060"/>
  <rect x="15" y="28" width="4" height="2" fill="#805060"/>
</svg>
