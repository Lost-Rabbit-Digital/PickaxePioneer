<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">

  <!-- ═══ EARS ═══ -->
  <!-- Left ear -->
  <polygon points="15,14 10,1 24,9" fill="#E8832A"/>
  <polygon points="17,13 13,5 22,9" fill="#FFAAAA" opacity="0.85"/>
  <!-- Right ear -->
  <polygon points="49,14 54,1 40,9" fill="#E8832A"/>
  <polygon points="47,13 51,5 42,9" fill="#FFAAAA" opacity="0.85"/>

  <!-- ═══ HEAD ═══ -->
  <circle cx="32" cy="16" r="12" fill="#E8832A"/>
  <!-- Lighter muzzle patch -->
  <ellipse cx="32" cy="20" rx="7" ry="5" fill="#FFD090"/>
  <!-- Tabby M-marking on forehead -->
  <path d="M 26 11 L 28 8 L 30 11 L 32 9 L 34 11 L 36 8 L 38 11"
        stroke="#C06010" stroke-width="1" fill="none" stroke-linejoin="round" opacity="0.7"/>

  <!-- ═══ EYES ═══ -->
  <!-- Iris -->
  <ellipse cx="25" cy="15" rx="4" ry="3.5" fill="#88CC44"/>
  <ellipse cx="39" cy="15" rx="4" ry="3.5" fill="#88CC44"/>
  <!-- Vertical pupils -->
  <ellipse cx="25" cy="15" rx="1.5" ry="3" fill="#111111"/>
  <ellipse cx="39" cy="15" rx="1.5" ry="3" fill="#111111"/>
  <!-- Specular shine -->
  <circle cx="26.5" cy="13" r="1" fill="white" opacity="0.8"/>
  <circle cx="40.5" cy="13" r="1" fill="white" opacity="0.8"/>

  <!-- ═══ NOSE ═══ -->
  <polygon points="32,20 30,22 34,22" fill="#FF88AA"/>
  <!-- Philtrum -->
  <line x1="32" y1="22" x2="32" y2="24" stroke="#DD6688" stroke-width="0.8"/>

  <!-- ═══ MOUTH ═══ -->
  <path d="M 30 24 Q 28 27 26 26" stroke="#CC5566" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 34 24 Q 36 27 38 26" stroke="#CC5566" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- ═══ WHISKERS ═══ -->
  <line x1="25" y1="20" x2="4"  y2="17" stroke="#7A4010" stroke-width="0.8" opacity="0.5"/>
  <line x1="25" y1="21" x2="4"  y2="22" stroke="#7A4010" stroke-width="0.8" opacity="0.5"/>
  <line x1="25" y1="22" x2="6"  y2="26" stroke="#7A4010" stroke-width="0.8" opacity="0.5"/>
  <line x1="39" y1="20" x2="60" y2="17" stroke="#7A4010" stroke-width="0.8" opacity="0.5"/>
  <line x1="39" y1="21" x2="60" y2="22" stroke="#7A4010" stroke-width="0.8" opacity="0.5"/>
  <line x1="39" y1="22" x2="58" y2="26" stroke="#7A4010" stroke-width="0.8" opacity="0.5"/>

  <!-- ═══ NECK ═══ -->
  <ellipse cx="32" cy="28" rx="5" ry="3" fill="#D07020"/>

  <!-- ═══ BODY (torso) ═══ -->
  <ellipse cx="32" cy="40" rx="11" ry="12" fill="#E8832A"/>
  <!-- Belly lighter patch -->
  <ellipse cx="32" cy="43" rx="7" ry="8" fill="#FFD090"/>

  <!-- Merchant vest (gold V-collar — marks this cat as the colony's trader) -->
  <path d="M 23 33 L 28 41 L 32 38 L 36 41 L 41 33"
        stroke="#DDAA33" stroke-width="1.8" fill="none" stroke-linejoin="round"/>

  <!-- ═══ ARMS ═══ -->
  <!-- Left arm: reaching out holding a gold coin -->
  <path d="M 21 38 Q 12 40 8 47" stroke="#C06010" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="7"  cy="48" r="4"   fill="#C06010"/>
  <circle cx="7"  cy="48" r="2.5" fill="#FFCC00"/>  <!-- gold coin -->
  <!-- Right arm: raised in greeting -->
  <path d="M 43 38 Q 52 33 55 24" stroke="#C06010" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="55" cy="23" r="4"   fill="#C06010"/>

  <!-- ═══ TAIL ═══ -->
  <path d="M 42 49 Q 54 52 57 44 Q 59 37 55 32"
        stroke="#E8832A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Tail tip (cream/lighter) -->
  <circle cx="54" cy="31" r="3.5" fill="#FFD090"/>

  <!-- ═══ PAWS / LEGS ═══ -->
  <!-- Left leg + paw -->
  <rect x="24" y="50" width="6" height="6" rx="3" fill="#D07020"/>
  <ellipse cx="27" cy="55" rx="5" ry="4" fill="#D07020"/>
  <!-- Right leg + paw -->
  <rect x="34" y="50" width="6" height="6" rx="3" fill="#D07020"/>
  <ellipse cx="37" cy="55" rx="5" ry="4" fill="#D07020"/>
  <!-- Left paw toe lines -->
  <line x1="24" y1="57" x2="23" y2="60" stroke="#B05010" stroke-width="1" stroke-linecap="round"/>
  <line x1="27" y1="58" x2="27" y2="61" stroke="#B05010" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="57" x2="31" y2="60" stroke="#B05010" stroke-width="1" stroke-linecap="round"/>
  <!-- Right paw toe lines -->
  <line x1="34" y1="57" x2="33" y2="60" stroke="#B05010" stroke-width="1" stroke-linecap="round"/>
  <line x1="37" y1="58" x2="37" y2="61" stroke="#B05010" stroke-width="1" stroke-linecap="round"/>
  <line x1="40" y1="57" x2="41" y2="60" stroke="#B05010" stroke-width="1" stroke-linecap="round"/>

</svg>
